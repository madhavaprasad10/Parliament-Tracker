{% extends 'tracker/base.html' %}
{% load static %}

{% block title %}Export Bills - Parliament Tracker{% endblock %}

{% block content %}
<div class="container">
    <h1 class="h3 mb-4">Export Bills</h1>
    <div class="card">
        <div class="card-body">
            <form method="get" action="{% url 'export_bills' %}">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Start Date</label>
                        <input type="date" name="start_date" class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>End Date</label>
                        <input type="date" name="end_date" class="form-control">
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Ministry</label>
                        <select name="ministry" class="form-control">
                            <option value="">All Ministries</option>
                            {% for m in ministries %}
                            <option value="{{ m }}">{{ m }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Party</label>
                        <select name="party" class="form-control">
                            <option value="">All Parties</option>
                            {% for p in parties %}
                            <option value="{{ p }}">{{ p }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>House</label>
                        <select name="house" class="form-control">
                            <option value="all">All Houses</option>
                            <option value="LOK_SABHA">Lok Sabha</option>
                            <option value="RAJYA_SABHA">Rajya Sabha</option>
                            <option value="BOTH">Both</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Status</label>
                        <select name="status" class="form-control">
                            <option value="all">All Status</option>
                            <option value="PASSED">Passed</option>
                            <option value="PENDING">Pending</option>
                            <option value="REJECTED">Rejected</option>
                            <option value="WITHDRAWN">Withdrawn</option>
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div class="col-12">
                        <label>Format</label>
                        <div class="btn-group d-flex" role="group">
                            <button type="submit" name="format" value="csv" class="btn btn-outline-success flex-fill">CSV</button>
                            <button type="submit" name="format" value="json" class="btn btn-outline-info flex-fill">JSON</button>
                            <button type="submit" name="format" value="xlsx" class="btn btn-outline-primary flex-fill">Excel</button>
                            <button type="submit" name="format" value="pdf" class="btn btn-outline-danger flex-fill">PDF</button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
